# lefthook.yml — https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: detect secrets
      run: gitleaks protect --staged

    - name: trim trailing whitespace
      run: sed -i 's/[[:space:]]*$//' {staged_files}
      glob: "*"

    - name: fix missing EOF newlines
      run: sed -i -e '$a\' {staged_files}
      glob: "*"

    - name: biome lint + format
      glob: "*.{js,ts,jsx,tsx,json,css,md}"
      run: bunx biome check {staged_files}

    - name: typecheck
      glob: "*.ts"
      run: bun run check-types
